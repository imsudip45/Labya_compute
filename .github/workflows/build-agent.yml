name: Build & Deploy Desktop Agent

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/agent/agent_gui.py'

jobs:
  build-agent-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests

      - name: Compile and Package Agent (via build script)
        run: |
          python build_agent.py

      - name: Commit and Push Compiled Binary
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add frontend/public/downloads/LabhyaComputeAgent.exe
          git add frontend/public/downloads/LabhyaComputeAgentSetup.exe
          git add frontend/public/downloads/LabhyaComputeAgent.py
          git commit -m "chore: auto-compiled latest windows desktop agent assets [skip ci]" || exit 0
          git push origin main
