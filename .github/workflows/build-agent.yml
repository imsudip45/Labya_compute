name: Build & Deploy Desktop Agent

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/agent/agent_gui.py'

jobs:
  build-agent-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests

      - name: Compile Standalone Agent Executable
        run: |
          pyinstaller --onefile --noconsole --name LabhyaComputeAgent backend/agent/agent_gui.py

      - name: Move Executable to Frontend Public downloads
        run: |
          mkdir -Force frontend/public/downloads
          copy dist/LabhyaComputeAgent.exe frontend/public/downloads/LabhyaComputeAgent.exe

      - name: Commit and Push Compiled Binary
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add frontend/public/downloads/LabhyaComputeAgent.exe
          git commit -m "chore: auto-compiled latest windows desktop agent executable [skip ci]" || exit 0
          git push origin main
