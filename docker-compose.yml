version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: labhya_db
    environment:
      POSTGRES_DB: labhya_compute
      POSTGRES_USER: labhya_user
      POSTGRES_PASSWORD: labhya_password
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labhya_user -d labhya_compute"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: labhya_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn labhya_compute.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8080:8000"
    environment:
      - DJANGO_SECRET_KEY=production-secret-key-change-me-in-prod
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=*
      - DATABASE_URL=postgres://labhya_user:labhya_password@db:5432/labhya_compute
      - DJANGO_CORS_ALLOWED_ORIGINS=http://localhost:3001
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    container_name: labhya_frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    depends_on:
      - backend

volumes:
  postgres_data:
